<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TypeCraft — Typing Trainer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --border: #2a2a30;
    --accent: #e8ff47;
    --text: #e8e6df;
    --muted: #6a6a7a;
    --correct: #4ade80;
    --wrong: #ff6b6b;
    --pending: #c8c6be;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 48px;
    border-bottom: 1px solid var(--border);
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    color: var(--accent);
  }
  .logo span { color: var(--muted); }

  .nav-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 48px;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  .live-stats {
    display: flex;
    gap: 40px;
    margin-bottom: 36px;
    width: 100%;
    align-items: center;
  }

  .stat-item { display: flex; flex-direction: column; gap: 4px; }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }

  .stat-value {
    font-family: 'Space Mono', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-unit { font-size: 12px; color: var(--muted); margin-left: 2px; }

  .timer-wrap {
    margin-left: auto;
    position: relative;
    width: 60px;
    height: 60px;
    flex-shrink: 0;
  }
  .timer-wrap svg { transform: rotate(-90deg); }
  .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .typing-container {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 32px 36px;
    position: relative;
    cursor: pointer;
    transition: border-color 0.2s;
    user-select: none;
  }
  .typing-container.active {
    border-color: rgba(232,255,71,0.35);
    box-shadow: 0 0 0 1px rgba(232,255,71,0.07);
  }

  .words-display {
    font-family: 'Space Mono', monospace;
    font-size: 21px;
    line-height: 2.2;
    letter-spacing: 0.02em;
    min-height: 132px;
    overflow: hidden;
    position: relative;
  }

  .char { position: relative; color: var(--pending); }
  .char.correct { color: var(--correct); }
  .char.wrong { color: var(--wrong); background: rgba(255,107,107,0.12); border-radius: 2px; }

  .char.cursor::before {
    content: '';
    position: absolute;
    left: -1px;
    top: 4px;
    bottom: 4px;
    width: 2px;
    background: var(--accent);
    border-radius: 2px;
    animation: blink 1s ease-in-out infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .click-hint {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(13,13,15,0.80);
    border-radius: 15px;
    backdrop-filter: blur(3px);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    transition: opacity 0.25s;
    z-index: 5;
  }
  .click-hint.hidden { opacity: 0; pointer-events: none; }

  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 20px;
    width: 100%;
  }

  .mode-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    padding: 6px 16px;
    border-radius: 20px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn:hover { border-color: var(--muted); color: var(--text); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.07); }

  .word-progress {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-left: auto;
  }

  .restart-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 8px 18px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .restart-btn:hover { border-color: var(--text); color: var(--text); }

  .toast {
    position: fixed;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: var(--surface);
    border: 1px solid rgba(232,255,71,0.5);
    border-radius: 10px;
    padding: 12px 24px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 200;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .results-overlay {
    position: fixed;
    inset: 0;
    background: rgba(13,13,15,0.94);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(8px);
  }
  .results-overlay.show { opacity: 1; pointer-events: all; }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 48px 52px;
    width: 100%;
    max-width: 520px;
    transform: translateY(16px);
    transition: transform 0.3s;
  }
  .results-overlay.show .results-card { transform: translateY(0); }

  .results-label {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .pb-banner {
    display: none;
    background: rgba(232,255,71,0.1);
    border: 1px solid rgba(232,255,71,0.3);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 20px;
    text-align: center;
  }
  .pb-banner.show { display: block; }

  .result-wpm {
    font-family: 'Space Mono', monospace;
    font-size: 78px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 4px;
  }
  .result-wpm-lbl {
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 36px;
  }

  .results-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 20px;
    margin-bottom: 36px;
  }
  .res-stat { display: flex; flex-direction: column; gap: 6px; }
  .res-stat-lbl { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; }
  .res-stat-val { font-family:'Space Mono',monospace; font-size:26px; font-weight:700; color:var(--text); }

  .res-actions { display: flex; gap: 10px; }

  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #0d0d0f;
    border: none;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    padding: 13px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.85; }

  .btn-secondary {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    padding: 13px 24px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-secondary:hover { border-color: var(--text); color: var(--text); }

  .history-panel {
    position: fixed;
    right: 0; top: 0; bottom: 0;
    width: 300px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    padding: 28px 24px;
    transform: translateX(100%);
    transition: transform 0.28s ease;
    overflow-y: auto;
    z-index: 40;
  }
  .history-panel.open { transform: translateX(0); }

  .history-hdr {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 20px;
  }
  .close-btn { background: none; border: none; color: var(--muted); font-size: 16px; cursor: pointer; }

  .history-empty {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    margin-top: 48px;
    line-height: 1.8;
  }

  .history-item {
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 8px;
    position: relative;
  }
  .hi-wpm { font-family:'Space Mono',monospace; font-size:24px; font-weight:700; color:var(--accent); }
  .hi-sublabel { font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); text-transform:uppercase; letter-spacing:1px; margin-bottom:8px; }
  .hi-meta { font-family:'Space Mono',monospace; font-size:11px; color:var(--muted); display:flex; gap:12px; }
  .hi-meta span { color: var(--text); }
  .hi-date { position:absolute; top:12px; right:12px; font-family:'Space Mono',monospace; font-size:9px; color:var(--muted); }

  .pb-badge {
    display: inline-block;
    background: rgba(232,255,71,0.14);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    padding: 2px 7px;
    border-radius: 20px;
    margin-left: 7px;
    vertical-align: middle;
  }

  .chart-section { margin-bottom: 20px; }
  .chart-lbl { font-family:'Space Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-bottom:8px; }
  .mini-chart { width:100%; height:56px; }
</style>
</head>
<body>

<header>
  <div class="logo">type<span>/</span>craft</div>
  <button class="nav-btn" onclick="toggleHistory()">history</button>
</header>

<main>
  <div class="live-stats">
    <div class="stat-item">
      <span class="stat-label">WPM</span>
      <div class="stat-value" id="live-wpm">0<span class="stat-unit">wpm</span></div>
    </div>
    <div class="stat-item">
      <span class="stat-label">Accuracy</span>
      <div class="stat-value" id="live-acc">—<span class="stat-unit">%</span></div>
    </div>
    <div class="stat-item">
      <span class="stat-label">Errors</span>
      <div class="stat-value" id="live-err">0</div>
    </div>
    <div class="stat-item">
      <span class="stat-label">Best</span>
      <div class="stat-value" id="live-pb">—<span class="stat-unit">wpm</span></div>
    </div>
    <div class="timer-wrap">
      <svg width="60" height="60" viewBox="0 0 60 60">
        <circle cx="30" cy="30" r="26" fill="none" stroke="#2a2a30" stroke-width="3"/>
        <circle id="timer-arc" cx="30" cy="30" r="26" fill="none" stroke="#e8ff47" stroke-width="3"
          stroke-dasharray="163.4" stroke-dashoffset="0" stroke-linecap="round"/>
      </svg>
      <div class="timer-text" id="timer-display">30</div>
    </div>
  </div>

  <div class="typing-container" id="typing-box" onclick="activateTyping()">
    <div class="words-display" id="words-display"></div>
    <div class="click-hint" id="click-hint">click here or press any key to start</div>
  </div>

  <div class="controls">
    <button class="mode-btn active" id="btn-30" onclick="setTime(30)">30s</button>
    <button class="mode-btn" id="btn-60" onclick="setTime(60)">60s</button>
    <button class="mode-btn" id="btn-120" onclick="setTime(120)">120s</button>
    <span class="word-progress" id="word-progress">0 / 80 words</span>
    <button class="restart-btn" onclick="resetTest()">↺ restart</button>
  </div>
</main>

<div class="toast" id="toast"></div>

<div class="results-overlay" id="results-overlay">
  <div class="results-card">
    <div class="results-label">results</div>
    <div class="pb-banner" id="pb-banner">🏆 New personal best!</div>
    <div class="result-wpm" id="result-wpm">0</div>
    <div class="result-wpm-lbl">words per minute</div>
    <div class="results-grid">
      <div class="res-stat"><span class="res-stat-lbl">Accuracy</span><span class="res-stat-val" id="result-acc">—</span></div>
      <div class="res-stat"><span class="res-stat-lbl">Errors</span><span class="res-stat-val" id="result-err">0</span></div>
      <div class="res-stat"><span class="res-stat-lbl">Duration</span><span class="res-stat-val" id="result-dur">30s</span></div>
    </div>
    <div class="res-actions">
      <button class="btn-primary" onclick="closeResults()">↺ try again</button>
      <button class="btn-secondary" onclick="toggleHistory(); closeResults()">view history</button>
    </div>
  </div>
</div>

<div class="history-panel" id="history-panel">
  <div class="history-hdr">
    session history
    <button class="close-btn" onclick="toggleHistory()">✕</button>
  </div>
  <div id="chart-section" class="chart-section" style="display:none">
    <div class="chart-lbl">WPM trend</div>
    <svg class="mini-chart" id="mini-chart" viewBox="0 0 252 56" preserveAspectRatio="none"></svg>
  </div>
  <div id="history-list"></div>
</div>

<script>
const WORDS = ["the","be","to","of","and","a","in","that","have","it","for","not","on","with","he","as","you","do","at","this","but","his","by","from","they","we","say","her","she","or","an","will","my","one","all","would","there","their","what","so","up","out","if","about","who","get","which","go","me","when","make","can","like","time","no","just","him","know","take","people","into","year","your","good","some","could","them","see","other","than","then","now","look","only","come","its","over","think","also","back","after","use","two","how","our","work","first","well","way","even","new","want","because","any","these","give","day","most","us","great","between","need","large","often","hand","high","place","hold","turn","help","start","never","before","end","move","play","small","number","off","always","those","both","type","head","under","story","saw","left","few","while","along","might","close","something","seem","open","together","next","white","children","begin","got","walk","example","ease","paper","however","through","much","call","show","around","form","three","set","put","does","another","same","big","where","world","keep","point","still","own","tell","since","next","without","too","place","go","long","down","day","did","get","come","made","may","part"];

let words = [], wordIdx = 0, charIdx = 0;
let started = false, finished = false, isActive = false;
let timer = null, timeLeft = 30, totalTime = 30;
let correctChars = 0, totalTyped = 0, errors = 0;
let checkpointShown = false;
let toastTimer = null;

const STORAGE_KEY = 'typecraft_v2';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { return []; }
}
function saveResult(r) {
  const h = loadHistory(); h.unshift(r);
  if (h.length > 50) h.pop();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}
function getBest(dur) {
  return loadHistory().filter(r => r.duration === dur).reduce((b, r) => r.wpm > b ? r.wpm : b, 0);
}

function genWords(n=80) {
  const a = [];
  for (let i=0;i<n;i++) a.push(WORDS[Math.floor(Math.random()*WORDS.length)]);
  return a;
}

function renderWords() {
  const d = document.getElementById('words-display');
  d.innerHTML = '';
  words.forEach((word, wi) => {
    const wEl = document.createElement('span');
    wEl.style.display = 'inline';
    [...word].forEach((ch, ci) => {
      const s = document.createElement('span');
      s.className = 'char';
      s.dataset.wi = wi; s.dataset.ci = ci;
      s.textContent = ch;
      wEl.appendChild(s);
    });
    const sp = document.createElement('span');
    sp.className = 'char';
    sp.dataset.wi = wi; sp.dataset.ci = word.length;
    sp.textContent = ' ';
    wEl.appendChild(sp);
    d.appendChild(wEl);
  });
  setCursor(0, 0);
  updateProgress();
}

function getChar(wi, ci) {
  return document.querySelector(`.char[data-wi="${wi}"][data-ci="${ci}"]`);
}

function setCursor(wi, ci) {
  document.querySelectorAll('.char.cursor').forEach(e => e.classList.remove('cursor'));
  const el = getChar(wi, ci);
  if (el) el.classList.add('cursor');
}

function scrollCheck() {
  const el = getChar(wordIdx, charIdx);
  if (!el) return;
  const d = document.getElementById('words-display');
  if (el.offsetTop > d.clientHeight - 60) {
    d.style.marginTop = `-${el.offsetTop - 44}px`;
  }
}

function updateProgress() {
  document.getElementById('word-progress').textContent = `${wordIdx} / ${words.length} words`;
}

function updateStats() {
  const elapsed = Math.max(0.01, totalTime - timeLeft);
  const wpm = Math.max(0, Math.round((correctChars / 5) / (elapsed / 60)));
  const acc = totalTyped > 0 ? Math.round(((totalTyped - errors) / totalTyped) * 100) : null;
  document.getElementById('live-wpm').innerHTML = `${wpm}<span class="stat-unit">wpm</span>`;
  document.getElementById('live-acc').innerHTML = acc !== null ? `${acc}<span class="stat-unit">%</span>` : `—<span class="stat-unit">%</span>`;
  document.getElementById('live-err').textContent = errors;
  const pct = timeLeft / totalTime;
  document.getElementById('timer-arc').style.strokeDashoffset = 163.4 * (1 - pct);
  document.getElementById('timer-display').textContent = timeLeft;
}

function loadPB() {
  const pb = getBest(totalTime);
  document.getElementById('live-pb').innerHTML = pb > 0 ? `${pb}<span class="stat-unit">wpm</span>` : `—<span class="stat-unit">wpm</span>`;
}

function startTimer() {
  if (started) return;
  started = true;
  timer = setInterval(() => {
    timeLeft--;
    updateStats();
    if (timeLeft <= 0) finishTest();
  }, 1000);
}

function finishTest() {
  if (finished) return;
  finished = true;
  clearInterval(timer);
  const mins = totalTime / 60;
  const wpm = Math.max(0, Math.round((correctChars / 5) / mins));
  const acc = totalTyped > 0 ? Math.round(((totalTyped - errors) / totalTyped) * 100) : 0;
  const pb = getBest(totalTime);
  const isNewPB = wpm > pb;
  const d = new Date();
  const date = d.toLocaleDateString('en-GB', {day:'2-digit',month:'short'}) + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  saveResult({ wpm, acc, errors, duration: totalTime, date });
  loadPB();
  setTimeout(() => {
    document.getElementById('result-wpm').textContent = wpm;
    document.getElementById('result-acc').textContent = acc + '%';
    document.getElementById('result-err').textContent = errors;
    document.getElementById('result-dur').textContent = totalTime + 's';
    document.getElementById('pb-banner').classList.toggle('show', isNewPB);
    document.getElementById('results-overlay').classList.add('show');
  }, 300);
}

function closeResults() {
  document.getElementById('results-overlay').classList.remove('show');
  resetTest();
}

function resetTest() {
  clearInterval(timer);
  started = false; finished = false; isActive = false;
  timeLeft = totalTime; wordIdx = 0; charIdx = 0;
  correctChars = 0; totalTyped = 0; errors = 0; checkpointShown = false;
  document.getElementById('words-display').style.marginTop = '0';
  document.getElementById('click-hint').classList.remove('hidden');
  document.getElementById('typing-box').classList.remove('active');
  document.getElementById('live-wpm').innerHTML = `0<span class="stat-unit">wpm</span>`;
  document.getElementById('live-acc').innerHTML = `—<span class="stat-unit">%</span>`;
  document.getElementById('live-err').textContent = '0';
  document.getElementById('timer-display').textContent = totalTime;
  document.getElementById('timer-arc').style.strokeDashoffset = '0';
  words = genWords(80);
  renderWords();
  loadPB();
}

function setTime(t) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + t).classList.add('active');
  totalTime = t;
  resetTest();
}

function activateTyping() {
  if (finished) return;
  isActive = true;
  document.getElementById('typing-box').classList.add('active');
  document.getElementById('click-hint').classList.add('hidden');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
}

document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (document.activeElement && document.activeElement.tagName === 'BUTTON') return;

  if (e.key === 'Tab') { e.preventDefault(); resetTest(); return; }

  const ignore = ['Shift','Control','Alt','Meta','CapsLock','Escape','ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Enter','F1','F2','F3','F4','F5','F6','F7','F8','F9','F10','F11','F12','PageUp','PageDown','Home','End','Insert','PrintScreen','ScrollLock','Pause'];
  if (ignore.includes(e.key)) return;

  if (finished) return;

  // Activate on first key
  if (!isActive) activateTyping();

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (charIdx > 0) {
      charIdx--;
      const el = getChar(wordIdx, charIdx);
      if (el) el.classList.remove('correct', 'wrong');
      setCursor(wordIdx, charIdx);
    }
    return;
  }

  if (e.key.length !== 1) return;
  e.preventDefault();
  if (!started) startTimer();

  const ch = e.key;
  const word = words[wordIdx];

  if (ch === ' ') {
    if (charIdx === 0) return;
    wordIdx++;
    charIdx = 0;
    if (wordIdx >= words.length) { finishTest(); return; }
    if (wordIdx === 30 && !checkpointShown) {
      checkpointShown = true;
      const elapsed = Math.max(1, totalTime - timeLeft);
      const wpm = Math.max(0, Math.round((correctChars / 5) / (elapsed / 60)));
      showToast('✓ 30 words done — ' + wpm + ' WPM so far');
    }
    setCursor(wordIdx, 0);
    scrollCheck();
    updateProgress();
    return;
  }

  if (charIdx < word.length) {
    const el = getChar(wordIdx, charIdx);
    if (!el) return;
    totalTyped++;
    if (ch === word[charIdx]) {
      el.classList.add('correct');
      correctChars++;
    } else {
      el.classList.add('wrong');
      errors++;
    }
    charIdx++;
    setCursor(wordIdx, charIdx);
    scrollCheck();
    updateProgress();
  }
});

function toggleHistory() {
  const p = document.getElementById('history-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderHistory();
}

function renderHistory() {
  const h = loadHistory();
  const list = document.getElementById('history-list');
  const cs = document.getElementById('chart-section');
  if (h.length === 0) {
    cs.style.display = 'none';
    list.innerHTML = '<div class="history-empty">No sessions yet.<br>Complete a test to see your results.</div>';
    return;
  }
  cs.style.display = 'block';
  drawChart(h.slice(0,20).reverse());
  const best = Math.max(...h.map(r => r.wpm));
  list.innerHTML = h.map(r => `
    <div class="history-item">
      <div class="hi-date">${r.date}</div>
      <div class="hi-wpm">${r.wpm}${r.wpm === best ? '<span class="pb-badge">PB</span>' : ''}</div>
      <div class="hi-sublabel">words per minute</div>
      <div class="hi-meta">acc <span>${r.acc}%</span> &nbsp;err <span>${r.errors}</span> &nbsp;<span>${r.duration}s</span></div>
    </div>`).join('');
}

function drawChart(data) {
  const svg = document.getElementById('mini-chart');
  if (data.length < 2) { svg.innerHTML = ''; return; }
  const max = Math.max(...data.map(d => d.wpm)) || 1;
  const W = 252, H = 52;
  const pts = data.map((d, i) => `${(i/(data.length-1))*W},${H-(d.wpm/max)*H}`);
  svg.innerHTML = `<polyline points="${pts.join(' ')}" fill="none" stroke="#e8ff47" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85"/>` +
    data.map((d,i) => { const x=(i/(data.length-1))*W, y=H-(d.wpm/max)*H; return `<circle cx="${x}" cy="${y}" r="2.5" fill="#e8ff47"/>`; }).join('');
}

resetTest();
</script>
</body>
